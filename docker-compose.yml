version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: tourist-safety-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tourist-safety-backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/tourist-safety
      - JWT_SECRET=your_super_secret_jwt_key_change_in_production
      - AI_SERVICE_URL=http://ai-service:8000
      - NODE_ENV=production
      - CORS_ORIGIN=http://localhost:5173
    depends_on:
      - mongodb
    networks:
      - app-network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: tourist-safety-ai
    ports:
      - "8000:8000"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tourist-safety-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  mongodb_data:

networks:
  app-network:
    driver: bridge
